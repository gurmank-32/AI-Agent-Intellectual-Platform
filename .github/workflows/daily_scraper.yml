# Daily scrape + optional vector indexing + update checks + email-style notifications.
#
# Repository secrets (GitHub → Settings → Secrets and variables → Actions):
#   Required:
#     SUPABASE_URL, SUPABASE_KEY
#   For LLM + embeddings (at least one provider must be usable):
#     ANTHROPIC_API_KEY, OPENAI_API_KEY, and/or GOOGLE_API_KEY
#   Default EMBED_PROVIDER in config is "gemini" → set GOOGLE_API_KEY for indexing,
#   or set secret EMBED_PROVIDER=openai and rely on OPENAI_API_KEY.
#   Optional: SMTP_* for real email; otherwise alerts fall back to local file (ephemeral on CI).

name: Daily Regulation Scraper

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

concurrency:
  group: daily-regulation-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run daily scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CHAT_PROVIDER: ${{ secrets.CHAT_PROVIDER }}
          EMBED_PROVIDER: ${{ secrets.EMBED_PROVIDER }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python scripts/run_scraper.py

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `Daily regulation scraper workflow failed.\\n\\nRun URL: ${runUrl}`
            });

